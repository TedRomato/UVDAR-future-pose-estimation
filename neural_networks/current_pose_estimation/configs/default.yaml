# ====================================================================
# Default configuration for current_pose_estimation
# ====================================================================

# --------------------------------------------------------------------
# Feature selection
# --------------------------------------------------------------------
features:
  blinkers:
    enabled: true
    max_leds: 4           # fixed-size LED slots in the feature vector
    min_leds: 2           # rows with fewer detections are dropped

  uvdar:
    enabled: true
    components:           # which parts of the UVDAR output to include
      - position          # [x, y, z]  —  the 3D estimate
      # - variance        # [var_x, var_y, var_z]  (future)
      # - orientation     # [qx, qy, qz, qw]      (future)

  # Computed features (depend on active modalities)
  derived: #[]
      - age               # seconds since last UVDAR (requires uvdar + blinkers)
    # - blinker_spread    # max pixel dist between LEDs (future)

# --------------------------------------------------------------------
# Model architecture
# --------------------------------------------------------------------
layers: [32, 32]
activation: relu          # relu | leaky_relu | tanh | gelu | elu

# --------------------------------------------------------------------
# Training
# --------------------------------------------------------------------
learning_rate: 0.001
optimizer: adam            # adam | adamw | sgd
weight_decay: 0.0001
epochs: 100
batch_size: 0             # 0 → full-batch
val_split: 0.2
val_padding: 0            # gap (samples) between train/val splits
split_mode: sequential     # sequential | random
seed: 42
residual_learning: false   # true → learn UVDAR error instead of full mapping
