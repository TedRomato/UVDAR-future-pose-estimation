# Learning rate for the optimizer (float)
learning_rate: 0.001

# Number of epochs to train for (int)
epochs: 20

# Sizes of the hidden layers (list of ints)
layers:
  - 256
  - 32

# Batch size:
#   0 → full-batch training
#   >0 → mini-batch training with this batch size
batch_size: 0

# Fraction of data used for validation (0.0–1.0)
val_split: 0.2

# L2 regularization strength applied in the optimizer
weight_decay: 0.0001

# Activation function for each hidden layer.
# Supported options:
#   relu
#   leaky_relu
#   tanh
#   gelu
#   elu
activation: "relu"

# Optimizer to use.
# Supported options:
#   adam
#   adamw
#   sgd
optimizer: "adam"
