# ======================================================================
# Fusion sweep — impact of training parameters on blinkers + UVDAR fusion
# ======================================================================

bases:

  fusion:
    features:
      blinkers: { enabled: true,  max_leds: 4, min_leds: 2 }
      uvdar:    { enabled: true,  components: [position] }
      derived:  []
    epochs: 125
    val_split: 0.3
    val_padding: 0
    split_mode: sequential
    weight_decay: 1.0e-4
    activation: relu
    optimizer: adamw
    seed: 42
    learning_rate: 3.0e-4
    layers: [64, 64]
    batch_size: 256
    residual_learning: true


sweeps:

  fusion-core-residual:
    - { name: direct,   base: fusion, residual_learning: false }
    - { name: residual, base: fusion, residual_learning: true }

  fusion-split-check:
    - { name: sequential, base: fusion, residual_learning: true, split_mode: sequential }
    - { name: random,     base: fusion, residual_learning: true, split_mode: random }

  fusion-led-visibility:
    - { name: leds-2, base: fusion, residual_learning: true, features: { blinkers: { enabled: true, max_leds: 2, min_leds: 2 }, uvdar: { enabled: true, components: [position] }, derived: [] } }
    - { name: leds-3, base: fusion, residual_learning: true, features: { blinkers: { enabled: true, max_leds: 3, min_leds: 3 }, uvdar: { enabled: true, components: [position] }, derived: [] } }
    - { name: leds-4, base: fusion, residual_learning: true, features: { blinkers: { enabled: true, max_leds: 4, min_leds: 4 }, uvdar: { enabled: true, components: [position] }, derived: [] } }

  fusion-core-seeds:
    - { name: seed41, base: fusion, residual_learning: true, seed: 41 }
    - { name: seed42, base: fusion, residual_learning: true, seed: 42 }
    - { name: seed43, base: fusion, residual_learning: true, seed: 43 }

  fusion-residual-wd:
    - { name: wd-1e-3, base: fusion, residual_learning: true, weight_decay: 1.0e-3 }
    - { name: wd-1e-4, base: fusion, residual_learning: true, weight_decay: 1.0e-4 }
    - { name: wd-1e-5, base: fusion, residual_learning: true, weight_decay: 1.0e-5 }

  fusion-residual-batch:
    - { name: bs-128,  base: fusion, residual_learning: true, batch_size: 128 }
    - { name: bs-256,  base: fusion, residual_learning: true, batch_size: 256 }
    - { name: bs-full, base: fusion, residual_learning: true, batch_size: 0 }
